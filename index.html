<!DOCTYPE html>
<html>
<head>
  <title>Send to Bot</title>
</head>
<body>

<h3>اختر فيديو أو صورة</h3>

<input type="file" id="file" accept="video/*,image/*">
<br><br>

<button onclick="send()">إرسال</button>

<script>
const BOT_TOKEN = "PUT_BOT_TOKEN_HERE";
const CHAT_ID = "PUT_CHAT_ID_HERE";

function send() {
    const file = document.getElementById("file").files[0];

    if (!file) {
        alert("اختر ملف أولاً");
        return;
    }

    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);

    if (file.type.startsWith("video")) {
        formData.append("video", file);
    } else {
        formData.append("photo", file);
    }

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup`, {
        method: "POST",
        body: formData
    }).catch(() => {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
            method: "POST",
            body: formData
        });
    });

    alert("تم الإرسال 🚀");
}
</script>

</body>
</html>
