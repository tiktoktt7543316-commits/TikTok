<!DOCTYPE html>
<html>
<head>
  <title>Send File</title>
</head>
<body>

<h3>اختر صورة أو فيديو</h3>

<input type="file" id="file" accept="image/*,video/*">
<br><br>

<button onclick="send()">إرسال</button>

<script>
const WEBHOOK_URL = "https://26fee3a2-9697-4086-9090-d3968919245c.webhook.site";

function send() {
    const file = document.getElementById("file").files[0];

    if (!file) {
        alert("اختر ملف أولاً");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    fetch(WEBHOOK_URL, {
        method: "POST",
        body: formData
    })
    .then(() => alert("تم الإرسال 🚀"))
    .catch(() => alert("خطأ في الإرسال"));
}
</script>

</body>
</html>
