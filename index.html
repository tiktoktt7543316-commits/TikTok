<!DOCTYPE html>
<html>
<head>
  <title>Send to Telegram Bot</title>
</head>
<body>

<h3>اختر فيديو أو صورة</h3>

<input type="file" id="file" accept="video/*,image/*">
<br><br>

<button onclick="sendFile()">إرسال</button>

<script>
const BOT_TOKEN = "8321087715:AAFVGMVDpSt5vf00pTRuAn G3Pd3IoM9F9jc";
const CHAT_ID = "5610581187";

function sendFile() {
    const file = document.getElementById("file").files[0];

    if (!file) {
        alert("اختر ملف أولاً");
        return;
    }

    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("document", file);

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
        method: "POST",
        body: formData
    })
    .then(() => alert("تم الإرسال 🚀"))
    .catch(() => alert("خطأ في الإرسال"));
}
</script>

</body>
</html>
